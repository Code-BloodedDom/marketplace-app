{% extends "base.html" %}

{% block content %}
<h2>Profile</h2>
<form method="post" enctype="multipart/form-data">
    <label>Bio:</label>
    <textarea name="bio">{{ current_user.bio or '' }}</textarea>
    <label>Phone:</label>
    <input type="text" name="phone" value="{{ current_user.phone or '' }}">
    <label>Location:</label>
    <input type="text" name="location" value="{{ current_user.location or '' }}">
    <label>Profile Picture:</label>
    <input type="file" name="profile_pic">
    {% if current_user.profile_pic %}
    <img src="{{ url_for('static', filename='uploads/' + current_user.profile_pic) }}" alt="Profile Pic" width="100">
    {% endif %}
    <button type="submit">Update Profile</button>
</form>
{% endblock %}
