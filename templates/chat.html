{% extends "base.html" %}

{% block content %}
<h2>Chat with {{ other_user.username }}</h2>
<div id="messages">
    {% for msg in messages %}
    <div class="message {% if msg.sender_id == current_user.id %}sent{% else %}received{% endif %}">
        <strong>{{ msg.sender.username }}:</strong> {{ msg.content }}
    </div>
    {% endfor %}
</div>
<form method="post">
    <input type="text" name="content" placeholder="Type a message..." required>
    <button type="submit">Send</button>
</form>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
<script>
    var socket = io();
    socket.on('connect', function() {
        socket.emit('join', {room: '{{ current_user.id }}_{{ other_user.id }}'});
    });
    socket.on('message', function(data) {
        var msgDiv = document.createElement('div');
        msgDiv.className = 'message received';
        msgDiv.innerHTML = '<strong>' + data.user + ':</strong> ' + data.msg;
        document.getElementById('messages').appendChild(msgDiv);
        // Browser notification
        if (Notification.permission === 'granted') {
            new Notification('New message from ' + data.user, { body: data.msg });
        }
    });
    // Request notification permission
    if ('Notification' in window && Notification.permission !== 'denied') {
        Notification.requestPermission();
    }
    document.querySelector('form').addEventListener('submit', function(e) {
        e.preventDefault();
        var msg = document.querySelector('input[name="content"]').value;
        socket.emit('message', {room: '{{ current_user.id }}_{{ other_user.id }}', msg: msg});
        document.querySelector('input[name="content"]').value = '';
    });
</script>
{% endblock %}
